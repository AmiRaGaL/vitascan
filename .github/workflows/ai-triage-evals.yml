name: AI Triage Evals

on:
  pull_request:
  workflow_dispatch:

jobs:
  ai-triage-evals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m app.evals.runner --mode mock
